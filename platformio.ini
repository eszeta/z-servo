; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = STM32G431CB
boards_dir = board

[env]
framework = arduino
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
lib_ldf_mode = deep+
check_skip_packages = yes

[env:STM32G431CB]
platform = ststm32
board = genericSTM32G431CB
build_src_filter = +<STM32/**.cc>
build_unflags = 
;   -std=gnu++17 ;去除引入C++17标准编译选项
build_flags =
;  -std=gnu++23 ;引入C++23标准编译选项
;  -flto=auto ;优化链接选项
 -Wl,-Map,.pio/build/STM32G431CB/firmware.map

[env:SerialToI2C]
platform = ststm32
board = genericSTM32G030C8T6
build_src_filter = +<SerialToI2C/**.cc>
build_flags =
 -DEEPROM_DISABLE

[env:GD32F130G8]
platform = https://github.com/CommunityGD32Cores/platform-gd32.git
board = genericGD32F130G8
build_src_filter = +<GD32/**.cc>
build_flags =
;  -Wl,--defsym=__stack_size=0x400
 -Wl,-Map,.pio/build/GD32F130G8/firmware.map
 -DEEPROM_DISABLE

[env:native]
platform = native
framework = 