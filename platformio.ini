; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = Servo
boards_dir = board

[stm32_common]
platform = ststm32
framework = arduino

[native_common]
platform = native
test_framework = unity
lib_deps =
	ArduinoFake
build_flags =
	-std=gnu++17
	-DDISABLE_DEBUG
	-Wno-missing-template-arg-list-after-template-kw

[env:Servo]
platform = ${stm32_common.platform}
framework = ${stm32_common.framework}
board = genericSTM32G431CB
upload_protocol = stlink
debug_tool = stlink
build_src_filter = +<Servo/**>
test_filter = test_servo
build_flags =
	-Wl,-Map,.pio/build/Servo/firmware.map

[env:InputBridge]
platform = ${stm32_common.platform}
framework = ${stm32_common.framework}
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
board = genericSTM32G030C8T6
build_src_filter = +<InputBridge/**>
test_filter = test_inputBridge

[env:Simulator]
platform = ${native_common.platform}
test_framework = ${native_common.test_framework}
test_build_src = yes
build_src_filter = +<Simulator/**>
test_filter = test_simulator
lib_deps = ${native_common.lib_deps}
build_flags = ${native_common.build_flags}

[env:Unit]
platform = ${native_common.platform}
test_framework = ${native_common.test_framework}
test_filter = test_unit
lib_deps = ${native_common.lib_deps}
build_flags = ${native_common.build_flags}
